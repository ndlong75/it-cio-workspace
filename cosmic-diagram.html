<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IT CIO Workspace — Cosmic Diagram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #020a14;
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  width: 100vw; height: 100vh;
  cursor: default;
}

canvas {
  position: fixed; inset: 0;
  pointer-events: none;
}

svg#diagram {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
}

/* HUD */
.hud-top {
  position: fixed; top: 24px; left: 32px;
  z-index: 20; pointer-events: none;
}
.hud-eye {
  font-size: 9px; letter-spacing: 5px;
  color: #6ee7b7; margin-bottom: 6px;
}
.hud-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(16px,2vw,22px);
  font-weight: 800; color: #fff;
  letter-spacing: -0.5px;
}
.hud-sub {
  font-size: 10px; color: #4a6280;
  margin-top: 4px; letter-spacing: 0.5px;
}

.hud-stats {
  position: fixed; top: 24px; right: 32px;
  z-index: 20; display: flex; gap: 16px;
  pointer-events: none;
}
.stat {
  text-align: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 10px 16px;
}
.stat-v {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 800;
}
.stat-l {
  font-size: 8px; letter-spacing: 2px;
  color: #4a6280; margin-top: 2px;
}

/* LEGEND */
.legend {
  position: fixed; bottom: 24px; left: 32px;
  z-index: 20; display: flex; gap: 16px;
  flex-wrap: wrap; pointer-events: none;
}
.leg {
  display: flex; align-items: center;
  gap: 6px; font-size: 9px;
  letter-spacing: 1px; color: #4a6280;
}
.leg-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.leg-line {
  width: 20px; height: 1px;
}

/* TOOLTIP */
.tooltip {
  position: fixed;
  background: rgba(8,20,36,0.96);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 14px 18px;
  max-width: 280px;
  z-index: 30;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  backdrop-filter: blur(12px);
}
.tooltip.visible { opacity: 1; }
.tt-name {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700;
  color: #fff; margin-bottom: 4px;
}
.tt-role {
  font-size: 10px; color: #6b809a;
  margin-bottom: 10px;
}
.tt-kpis {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-bottom: 10px;
}
.tt-kpi {
  font-size: 8px; padding: 2px 7px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #8da0b8; letter-spacing: 0.5px;
}
.tt-wfs {
  font-size: 9px; color: #4a6280;
  line-height: 1.7;
}
.tt-wf { color: #8da0b8; }
.tt-wf span { opacity: 0.6; font-size: 8px; }

/* WATERMARK */
.watermark {
  position: fixed; bottom: 24px; right: 32px;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(255,255,255,0.08);
  z-index: 20; pointer-events: none;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<svg id="diagram"></svg>

<div class="hud-top">
  <div class="hud-eye">IT CIO WORKSPACE — INSURANCE CO. VN</div>
  <div class="hud-title">Cosmic IT Operations Universe</div>
  <div class="hud-sub">Hover planets to explore · 6 agents · 30 workflows · 30 prompts</div>
</div>

<div class="hud-stats">
  <div class="stat"><div class="stat-v" style="color:#22c55e">11</div><div class="stat-l">AUTO</div></div>
  <div class="stat"><div class="stat-v" style="color:#f59e0b">9</div><div class="stat-l">TELE</div></div>
  <div class="stat"><div class="stat-v" style="color:#60a5fa">10</div><div class="stat-l">DEEP</div></div>
  <div class="stat"><div class="stat-v" style="color:#6ee7b7">6</div><div class="stat-l">AGENTS</div></div>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#f97316"></div>Data In</div>
  <div class="leg"><div class="leg-dot" style="background:#a78bfa"></div>Output</div>
  <div class="leg">
    <div class="leg-line" style="background:repeating-linear-gradient(90deg,rgba(255,255,255,0.3) 0,rgba(255,255,255,0.3) 4px,transparent 4px,transparent 8px)"></div>
    Agent Link
  </div>
  <div class="leg">
    <div class="leg-line" style="background:rgba(255,255,255,0.15)"></div>
    Data Flow
  </div>
</div>

<div class="watermark">COSMIC CLAUDE DATA FLOW UNIVERSE · IT INSURANCE VN · 30WF · 6 AGENTS</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────
const W = () => window.innerWidth;
const H = () => window.innerHeight;
const cx = () => W() * 0.5;
const cy = () => H() * 0.5;

const AGENTS = [
  {
    id:'cio', label:'CIO', sublabel:'IT Dept Head', color:'#60a5fa', glow:'#3b82f6',
    r: 68, orbit: 0, angle: 0, speed: 0,
    tier:'C-Level', reports:'CEO / BOD',
    kpis:['0 critical missed','Board informed','Scorecard ≥85%','Budget ±5%'],
    wfs:[
      {n:'W1',name:'Daily IT Briefing',type:'AUTO'},
      {n:'W2',name:'Weekly Scorecard',type:'AUTO'},
      {n:'W3',name:'Board Request',type:'TELE'},
      {n:'W4',name:'Monthly Board Report',type:'DEEP'},
      {n:'W5',name:'EOD Summary + Archive',type:'AUTO'},
    ]
  },
  {
    id:'snow', label:'SNOW', sublabel:'ITSM Lead', color:'#6ee7b7', glow:'#10b981',
    r: 50, orbit: 170, angle: 15, speed: 0.00025,
    tier:'Executive', reports:'CIO',
    kpis:['0 unassigned >1h','SLA breach <5%','MTTR P1 ≤2h','CHG success ≥95%'],
    wfs:[
      {n:'W1',name:'Daily Queue Triage',type:'AUTO'},
      {n:'W2',name:'SLA Breach Prevention',type:'AUTO'},
      {n:'W3',name:'Incident Auto-Response',type:'OD'},
      {n:'W4',name:'CAB Change Review',type:'TELE'},
      {n:'W5',name:'Monthly ITSM Report',type:'DEEP'},
    ]
  },
  {
    id:'infra', label:'INFRA', sublabel:'Infrastructure', color:'#fb923c', glow:'#ea580c',
    r: 48, orbit: 240, angle: 80, speed: 0.00018,
    tier:'Executive', reports:'CIO',
    kpis:['Uptime ≥99.5%','Backup 100%','MTTR P1 ≤2h','DR RTO ≤4h'],
    wfs:[
      {n:'W1',name:'Infra Health Check',type:'AUTO'},
      {n:'W2',name:'Capacity Planning',type:'AUTO'},
      {n:'W3',name:'Incident Response',type:'OD'},
      {n:'W4',name:'Patch Management',type:'TELE'},
      {n:'W5',name:'DR & BC Test',type:'DEEP'},
    ]
  },
  {
    id:'sec', label:'SEC', sublabel:'Cybersecurity', color:'#f43f5e', glow:'#be123c',
    r: 46, orbit: 310, angle: 170, speed: 0.00022,
    tier:'Executive', reports:'CIO',
    kpis:['Alert ≤15 min','0 orphaned admin','Compliance 100%','Click rate <5%'],
    wfs:[
      {n:'W1',name:'Security Morning Watch',type:'AUTO'},
      {n:'W2',name:'Access Control Review',type:'AUTO'},
      {n:'W3',name:'Phishing Simulation',type:'TELE'},
      {n:'W4',name:'Security Incident',type:'OD'},
      {n:'W5',name:'Compliance Check',type:'DEEP'},
    ]
  },
  {
    id:'dev', label:'DEV', sublabel:'Development', color:'#a78bfa', glow:'#7c3aed',
    r: 46, orbit: 220, angle: 260, speed: 0.00020,
    tier:'Manager', reports:'CIO',
    kpis:['Sprint ≥80%','PR review ≤24h','CI pass ≥95%','0 critical to prod'],
    wfs:[
      {n:'W1',name:'Daily Dev Standup',type:'AUTO'},
      {n:'W2',name:'Code Quality Gate',type:'TELE'},
      {n:'W3',name:'Post-Deploy Check',type:'TELE'},
      {n:'W4',name:'Sprint Planning',type:'DEEP'},
      {n:'W5',name:'Tech Debt Assessment',type:'DEEP'},
    ]
  },
  {
    id:'pm', label:'PM', sublabel:'Project Mgr', color:'#34d399', glow:'#059669',
    r: 44, orbit: 175, angle: 200, speed: 0.00015,
    tier:'Manager', reports:'CIO',
    kpis:['≥80% on-track','Stakeholder ≥4/5','Risk current','Utilization 70-85%'],
    wfs:[
      {n:'W1',name:'Daily Project Pulse',type:'AUTO'},
      {n:'W2',name:'Stakeholder Update',type:'AUTO'},
      {n:'W3',name:'Risk Register Review',type:'TELE'},
      {n:'W4',name:'Capacity Planning',type:'DEEP'},
      {n:'W5',name:'Project Closure',type:'DEEP'},
    ]
  },
];

const DATA_IN = [
  {label:'ServiceNow', color:'#6ee7b7', ax:-0.42, ay:-0.30},
  {label:'Jira',       color:'#4ade80', ax:-0.44, ay:-0.05},
  {label:'GitHub',     color:'#c084fc', ax:-0.44, ay: 0.20},
  {label:'Monitoring', color:'#fb923c', ax:-0.40, ay: 0.42},
  {label:'Email/Teams',color:'#38bdf8', ax:-0.36, ay:-0.52},
  {label:'SIEM',       color:'#f43f5e', ax:-0.30, ay: 0.58},
  {label:'Active Dir.', color:'#fbbf24', ax:-0.22, ay:-0.60},
  {label:'SonarQube',  color:'#818cf8', ax:-0.15, ay: 0.65},
  {label:'CVE/NVD',    color:'#f87171', ax:-0.08, ay:-0.65},
  {label:'Backup Sys', color:'#94a3b8', ax: 0.05, ay: 0.68},
  {label:'Core System',color:'#94a3b8', ax:-0.48, ay: 0.60},
];

const OUTPUTS = [
  {label:'Teams Reports',  color:'#a78bfa', ax: 0.43, ay:-0.35},
  {label:'Board Emails',   color:'#a78bfa', ax: 0.46, ay:-0.10},
  {label:'Jira Tasks',     color:'#4ade80', ax: 0.44, ay: 0.15},
  {label:'Snow Tickets',   color:'#6ee7b7', ax: 0.42, ay: 0.38},
  {label:'Excel/PPT',      color:'#f59e0b', ax: 0.38, ay:-0.55},
  {label:'daily_log/',     color:'#94a3b8', ax: 0.34, ay: 0.58},
  {label:'archive/',       color:'#94a3b8', ax: 0.26, ay:-0.63},
  {label:'Incident Report',color:'#f43f5e', ax: 0.20, ay: 0.65},
];

const TYPE_COLORS = { AUTO:'#22c55e', TELE:'#f59e0b', DEEP:'#60a5fa', OD:'#f43f5e' };

// ─── STARS ───────────────────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = W(); canvas.height = H();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const STARS = Array.from({length:200}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.5 + 0.3,
  o: Math.random() * 0.6 + 0.1,
  tw: Math.random() * 3000 + 1000,
  t0: Math.random() * 3000,
}));

function drawStars(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  STARS.forEach(s => {
    const tw = 0.5 + 0.5 * Math.sin((t - s.t0) / s.tw * Math.PI * 2);
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.o * (0.5 + 0.5*tw)})`;
    ctx.fill();
  });
}

// ─── SVG ─────────────────────────────────────────────────────
const svg = document.getElementById('diagram');
const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs={}, parent=svg) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  parent.appendChild(e);
  return e;
}

function elH(tag, attrs={}, inner='', parent=svg) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  if (inner) e.innerHTML = inner;
  parent.appendChild(e);
  return e;
}

// Defs
const defs = el('defs');

// Radial gradients for agents
AGENTS.forEach(ag => {
  const rg = el('radialGradient', {id:`rg-${ag.id}`,cx:'35%',cy:'35%',r:'70%'}, defs);
  el('stop', {offset:'0%', 'stop-color':ag.color,'stop-opacity':'0.9'}, rg);
  el('stop', {offset:'100%','stop-color':ag.glow, 'stop-opacity':'0.6'}, rg);

  const gg = el('radialGradient', {id:`gg-${ag.id}`,cx:'50%',cy:'50%',r:'50%'}, defs);
  el('stop', {offset:'0%',  'stop-color':ag.glow,'stop-opacity':'0.35'}, gg);
  el('stop', {offset:'100%','stop-color':ag.glow,'stop-opacity':'0'}, gg);
});

// Center glow gradient
const cgr = el('radialGradient', {id:'cg-cio',cx:'50%',cy:'50%',r:'50%'}, defs);
el('stop', {offset:'0%',  'stop-color':'#60a5fa','stop-opacity':'0.25'}, cgr);
el('stop', {offset:'100%','stop-color':'#60a5fa','stop-opacity':'0'}, cgr);

// Particle filter
const filt = el('filter', {id:'blur-soft',x:'-50%',y:'-50%',width:'200%',height:'200%'}, defs);
el('feGaussianBlur', {in:'SourceGraphic', stdDeviation:'3'}, filt);

const filt2 = el('filter', {id:'blur-node',x:'-100%',y:'-100%',width:'300%',height:'300%'}, defs);
el('feGaussianBlur', {in:'SourceGraphic', stdDeviation:'8'}, filt2);

// ─── LAYERS ──────────────────────────────────────────────────
const gOrbitRings = el('g', {id:'orbit-rings'});
const gDataLines  = el('g', {id:'data-lines',   opacity:'0.3'});
const gOutputLines= el('g', {id:'output-lines', opacity:'0.25'});
const gAgentLines = el('g', {id:'agent-lines',  opacity:'0.4'});
const gGlows      = el('g', {id:'glows'});
const gAgents     = el('g', {id:'agents'});
const gLabels     = el('g', {id:'labels'});
const gDataNodes  = el('g', {id:'data-nodes'});
const gOutNodes   = el('g', {id:'out-nodes'});
const gParticles  = el('g', {id:'particles', filter:'url(#blur-soft)'});

// ─── ORBIT RINGS ─────────────────────────────────────────────
const orbits = [...new Set(AGENTS.filter(a=>a.orbit>0).map(a=>a.orbit))];
orbits.forEach(r => {
  el('circle', {
    cx:cx(), cy:cy(), r,
    fill:'none',
    stroke:'rgba(255,255,255,0.06)',
    'stroke-width':'1',
    'stroke-dasharray':'3 6',
  }, gOrbitRings);
});

// ─── AGENT POSITIONS ─────────────────────────────────────────
let angles = {};
AGENTS.forEach(ag => { angles[ag.id] = ag.angle * Math.PI/180; });

function agentPos(ag) {
  if (ag.orbit === 0) return { x: cx(), y: cy() };
  const a = angles[ag.id];
  return { x: cx() + ag.orbit * Math.cos(a), y: cy() + ag.orbit * Math.sin(a) };
}

// ─── DATA PARTICLES ──────────────────────────────────────────
const PARTICLES = [];
function spawnParticle(sx, sy, tx, ty, color) {
  const p = el('circle', {r:'2.5', fill:color, opacity:'0'}, gParticles);
  PARTICLES.push({ el:p, sx, sy, tx, ty, t:0, dur: 2000 + Math.random()*2000, start: performance.now() + Math.random()*4000 });
}

// ─── NODE: DATA IN ───────────────────────────────────────────
DATA_IN.forEach(d => {
  const px = cx() + d.ax * W() * 0.5;
  const py = cy() + d.ay * H() * 0.5;

  // glow behind
  el('circle',{cx:px,cy:py,r:'14',fill:`${d.color}18`,filter:'url(#blur-node)'},gGlows);
  // dot
  el('circle',{cx:px,cy:py,r:'4',fill:d.color,opacity:'0.85'},gDataNodes);
  el('circle',{cx:px,cy:py,r:'7',fill:'none',stroke:d.color,opacity:'0.3','stroke-width':'1'},gDataNodes);

  // label
  const lx = px + (d.ax < 0 ? -14 : 14);
  const anchor = d.ax < 0 ? 'end' : 'start';
  const t = el('text',{x:lx,y:py+1,'text-anchor':anchor,'dominant-baseline':'middle',
    fill:d.color,opacity:'0.8','font-family':'DM Mono','font-size':'10','letter-spacing':'0.5'},gLabels);
  t.textContent = d.label;

  // line to CIO center
  el('line',{x1:px,y1:py,x2:cx(),y2:cy(),
    stroke:d.color,'stroke-width':'0.6','stroke-dasharray':'5 8'},gDataLines);

  // spawn particles toward CIO
  for(let i=0;i<3;i++) spawnParticle(px,py,cx(),cy(),d.color);
});

// ─── NODE: OUTPUTS ────────────────────────────────────────────
OUTPUTS.forEach(d => {
  const px = cx() + d.ax * W() * 0.5;
  const py = cy() + d.ay * H() * 0.5;

  el('circle',{cx:px,cy:py,r:'12',fill:`${d.color}15`,filter:'url(#blur-node)'},gGlows);
  el('circle',{cx:px,cy:py,r:'3.5',fill:d.color,opacity:'0.75'},gOutNodes);
  el('circle',{cx:px,cy:py,r:'6',fill:'none',stroke:d.color,opacity:'0.25','stroke-width':'1'},gOutNodes);

  const lx = px + (d.ax > 0 ? 12 : -12);
  const anchor = d.ax > 0 ? 'start' : 'end';
  const t = el('text',{x:lx,y:py+1,'text-anchor':anchor,'dominant-baseline':'middle',
    fill:d.color,opacity:'0.7','font-family':'DM Mono','font-size':'10','letter-spacing':'0.5'},gLabels);
  t.textContent = d.label;

  el('line',{x1:cx(),y1:cy(),x2:px,y2:py,
    stroke:d.color,'stroke-width':'0.6','stroke-dasharray':'4 9'},gOutputLines);

  for(let i=0;i<2;i++) spawnParticle(cx(),cy(),px,py,d.color);
});

// ─── AGENT NODES ─────────────────────────────────────────────
const agentEls = {};

AGENTS.forEach(ag => {
  const {x, y} = agentPos(ag);

  // orbit glow halo
  const gHalo = el('g',{},gGlows);
  const halo = el('circle',{cx:x,cy:y,r:ag.r+20,fill:`url(#gg-${ag.id})`},gHalo);

  // agent line to CIO
  let agLine = null;
  if (ag.orbit > 0) {
    agLine = el('line',{x1:x,y1:y,x2:cx(),y2:cy(),
      stroke:ag.color,'stroke-width':'1',
      'stroke-dasharray':'8 5',opacity:'0.5'},gAgentLines);
    // particles along agent line
    for(let i=0;i<4;i++) spawnParticle(x,y,cx(),cy(),ag.color);
  }

  // planet group
  const g = el('g',{cursor:'pointer',transform:`translate(${x},${y})`},gAgents);
  g.style.transition = 'transform 0.3s';

  // outer ring pulse
  const outerRing = el('circle',{cx:0,cy:0,r:ag.r+8,fill:'none',stroke:ag.color,
    'stroke-width':'1',opacity:'0.2'},g);
  // main sphere
  const circle = el('circle',{cx:0,cy:0,r:ag.r,fill:`url(#rg-${ag.id})`,
    stroke:ag.color,'stroke-width':'1.5',filter:'none'},g);
  // highlight spec
  el('ellipse',{cx:-ag.r*0.25,cy:-ag.r*0.25,rx:ag.r*0.25,ry:ag.r*0.18,
    fill:'rgba(255,255,255,0.18)',transform:'rotate(-30)'},g);

  // label
  const tg = el('g',{},g);
  const lbl = el('text',{x:0,y:-6,'text-anchor':'middle','dominant-baseline':'auto',
    fill:'#fff','font-family':'Syne,sans-serif','font-size': ag.id==='cio' ? '14' : '11',
    'font-weight':'800','letter-spacing':'-0.3'},tg);
  lbl.textContent = ag.label;

  const sub = el('text',{x:0,y:9,'text-anchor':'middle','dominant-baseline':'auto',
    fill:'rgba(255,255,255,0.55)','font-family':'DM Mono','font-size':'8',
    'letter-spacing':'0.5'},tg);
  sub.textContent = ag.id==='cio' ? 'HEAD' : ag.sublabel.split(' ')[0].toUpperCase();

  // wf count badge
  const badge = el('g',{transform:`translate(${ag.r*0.65},${-ag.r*0.65})`},g);
  el('circle',{cx:0,cy:0,r:10,fill:'rgba(8,20,36,0.85)',stroke:ag.color,'stroke-width':'1'},badge);
  const bText = el('text',{x:0,y:1,'text-anchor':'middle','dominant-baseline':'middle',
    fill:ag.color,'font-family':'Syne,sans-serif','font-size':'9','font-weight':'700'},badge);
  bText.textContent = ag.wfs.length + 'W';

  // workflow type indicators around planet
  ag.wfs.forEach((wf,i) => {
    const a = (i / ag.wfs.length) * Math.PI * 2 - Math.PI/2;
    const pr = ag.r + 22;
    const px = Math.cos(a) * pr, py = Math.sin(a) * pr;
    const c = TYPE_COLORS[wf.type] || '#94a3b8';
    el('circle',{cx:px,cy:py,r:3,fill:c,opacity:'0.7'},g);
  });

  agentEls[ag.id] = { g, circle, halo, outerRing, agLine, x, y };

  // hover
  g.addEventListener('mouseenter', (e) => showTooltip(ag, e));
  g.addEventListener('mousemove',  (e) => moveTooltip(e));
  g.addEventListener('mouseleave', () => hideTooltip());
});

// ─── TOOLS labels (center area) ──────────────────────────────
const TOOLS = [
  {label:'/schedule', x: cx()-80, y: cy()-50, c:'rgba(255,255,255,0.3)'},
  {label:'Cowork',    x: cx()+60, y: cy()-55, c:'rgba(255,255,255,0.3)'},
  {label:'MCP',       x: cx()-65, y: cy()+45, c:'rgba(255,255,255,0.3)'},
  {label:'Claude Code',x:cx()+55, y: cy()+50, c:'rgba(255,255,255,0.3)'},
];
TOOLS.forEach(t => {
  const g = el('g',{}, gLabels);
  el('rect',{x:t.x-26,y:t.y-8,width:52,height:16,rx:3,
    fill:'rgba(255,255,255,0.04)',stroke:'rgba(255,255,255,0.1)','stroke-width':'0.5'},g);
  const tx = el('text',{x:t.x,y:t.y+1,'text-anchor':'middle','dominant-baseline':'middle',
    fill:t.c,'font-family':'DM Mono','font-size':'8','letter-spacing':'0.5'},g);
  tx.textContent = t.label;
});

// ─── TOOLTIP ─────────────────────────────────────────────────
const tip = document.getElementById('tooltip');

function showTooltip(ag, e) {
  const wfHTML = ag.wfs.map(w =>
    `<div class="tt-wf">${w.n} ${w.name} <span style="color:${TYPE_COLORS[w.type]}">[${w.type}]</span></div>`
  ).join('');
  const kpiHTML = ag.kpis.map(k => `<span class="tt-kpi">${k}</span>`).join('');
  tip.innerHTML = `
    <div class="tt-name" style="color:${ag.color}">${ag.label} — ${ag.sublabel}</div>
    <div class="tt-role">${ag.tier} · Reports to ${ag.reports}</div>
    <div class="tt-kpis">${kpiHTML}</div>
    <div class="tt-wfs">${wfHTML}</div>`;
  tip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  let x = e.clientX + 16, y = e.clientY - 10;
  if (x + 290 > W()) x = e.clientX - 296;
  if (y + 220 > H()) y = e.clientY - 230;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTooltip() { tip.classList.remove('visible'); }

// ─── ANIMATION ───────────────────────────────────────────────
let lastT = 0;

function animate(t) {
  requestAnimationFrame(animate);

  // Stars
  drawStars(t);

  // Rotate orbits
  const dt = t - lastT; lastT = t;
  AGENTS.forEach(ag => {
    if (ag.speed === 0) return;
    angles[ag.id] += ag.speed * dt;
    const {x, y} = agentPos(ag);
    const eData = agentEls[ag.id];

    // Move planet group
    eData.g.setAttribute('transform', `translate(${x},${y})`);

    // Move glow
    eData.halo.setAttribute('cx', x);
    eData.halo.setAttribute('cy', y);

    // Move agent line
    if (eData.agLine) {
      eData.agLine.setAttribute('x1', x);
      eData.agLine.setAttribute('y1', y);
    }

    // Update stored position
    eData.x = x; eData.y = y;
  });

  // Animate particles
  const now = performance.now();
  PARTICLES.forEach(p => {
    const elapsed = now - p.start;
    if (elapsed < 0) { p.el.setAttribute('opacity','0'); return; }
    const prog = (elapsed % p.dur) / p.dur;
    const ease = prog < 0.1 ? prog/0.1 : prog > 0.9 ? (1-prog)/0.1 : 1;
    p.el.setAttribute('cx', p.sx + (p.tx - p.sx) * prog);
    p.el.setAttribute('cy', p.sy + (p.ty - p.sy) * prog);
    p.el.setAttribute('opacity', ease * 0.7);
  });

  // Pulse orbit rings
  const pulse = 0.04 + 0.02 * Math.sin(t * 0.0008);
  document.querySelectorAll('#orbit-rings circle').forEach((c,i) => {
    c.setAttribute('opacity', pulse + i*0.01);
  });

  // Breathe CIO planet
  const cioEl = agentEls['cio'];
  const cioBreath = 1 + 0.015 * Math.sin(t * 0.0015);
  cioEl.circle.setAttribute('r', 68 * cioBreath);

  // Pulse agent outer rings
  Object.values(agentEls).forEach((ae,i) => {
    const p2 = 0.15 + 0.1 * Math.sin(t * 0.001 + i * 1.2);
    ae.outerRing.setAttribute('opacity', p2);
  });
}

// Resize: update orbit ring centers
window.addEventListener('resize', () => {
  document.querySelectorAll('#orbit-rings circle').forEach(c => {
    c.setAttribute('cx', cx()); c.setAttribute('cy', cy());
  });
});

requestAnimationFrame(animate);
</script>
